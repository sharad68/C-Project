services:
  postgres:
    image: postgres:16-alpine
    container_name: tornois-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tornois}
      POSTGRES_USER: ${POSTGRES_USER:-tornois}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tornois_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: tornois-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@tornois.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tornois-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Cors__AllowedOrigins__0: http://localhost:5173
      Jwt__Issuer: ${JWT_ISSUER:-Tornois.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-Tornois.Frontend}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-replace-with-a-long-random-secret}
      ExternalApis__ApiSportsApiKey: ${API_SPORTS_KEY:-}
      ExternalApis__TheSportsDbApiKey: ${THE_SPORTS_DB_KEY:-}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-tornois};Username=${POSTGRES_USER:-tornois};Password=${POSTGRES_PASSWORD:-tornois_dev_password}
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:8080/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: tornois-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
